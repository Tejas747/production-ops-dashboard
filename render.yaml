services:
  - type: web
    name: production-ops-dashboard
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn --chdir backend app:app --bind 0.0.0.0:$PORT --workers 4

  - type: cron
    name: keep-alive-ping
    runtime: python
    schedule: "*/10 * * * *"
    buildCommand: pip install requests
    startCommand: python -c "import requests; r = requests.get('https://production-ops-dashboard.onrender.com/ping'); print(r.json())"